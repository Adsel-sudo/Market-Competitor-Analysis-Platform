services:
  api:
    build:
      context: ./backend
    container_name: market-analysis-api-dev
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: sqlite:////app/data/test.db
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend:/app
      - api_uploads:/app/uploads
      - api_sqlite_data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  api_uploads:
  api_sqlite_data:
